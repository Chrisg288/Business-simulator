<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Business Simulator</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef3f8;color:#17202a}
header{background:#111;color:white;padding:12px;position:sticky;top:0;z-index:10}
h1{margin:0;font-size:18px}p{margin:5px 0}
main{padding:8px;max-width:900px;margin:auto}
.controls,.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
button{min-height:42px;border-radius:12px;border:1px solid #777;background:white;font-size:15px;font-weight:900}
#start{background:#0b5da6;color:white}#pause{background:#b00020;color:white}
.card,.panel,details{background:white;border:1px solid #bfd0df;border-radius:14px;padding:8px;margin-bottom:8px}
.metric b{display:block;font-size:11px;color:#667;text-transform:uppercase}.metric span{font-size:20px;font-weight:900}
label{display:flex;justify-content:space-between;font-weight:800;margin-top:10px;font-size:14px}
input{width:100%;height:32px}
.panel{border:2px solid #bfd0df}.panel.active{border-color:#1976d2;box-shadow:0 0 12px #9dc8ef}
.title{font-size:15px;font-weight:900}.sub{font-size:11px;color:#667}
.grid{display:grid;grid-template-columns:1fr;gap:5px;margin-top:7px}
.inputs{display:grid;gap:4px}
.row{display:grid;grid-template-columns:26px 1fr 34px;gap:5px;align-items:center;border:1px solid #dce5ee;border-radius:10px;padding:4px}
.name{font-size:11px;font-weight:900}.val{text-align:right;font-weight:900;font-size:13px}
.bar{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;height:10px}
.blk{background:#e7edf4;border:1px solid #ccd;border-radius:3px}
.on.b{background:#1976d2}.on.g{background:#29972d}.on.y{background:#f0b600}.on.o{background:#b96d22}
.arrow{height:10px;width:24px;background:#1976d2;border-radius:3px;position:relative;transform:rotate(90deg);margin:auto;animation:pulse .9s infinite}
.arrow:after{content:"";position:absolute;right:-9px;top:-5px;border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:10px solid #1976d2}
.arrow.g{background:#1f8a2e}.arrow.g:after{border-left-color:#1f8a2e}
@keyframes pulse{50%{opacity:.45}}
.box,.out{border:2px solid #123b64;border-radius:12px;overflow:hidden;min-height:68px;text-align:center;background:#f8fbff}
.out{border-color:#1f7a2e;background:#fbfffb}
.box h3,.out h3{margin:0;padding:4px;background:#0b5da6;color:white;font-size:11px}
.out h3{background:#1f8a2e}
.worker{font-size:28px;padding-top:4px;animation:work .7s infinite alternate}.note{font-size:10px;font-weight:800;color:#667}
@keyframes work{from{transform:rotate(-2deg)}to{transform:rotate(2deg) translateY(-3px)}}
.stack{display:flex;flex-wrap:wrap;align-content:flex-end;justify-content:center;gap:3px;height:30px;padding:3px}
.cube{width:11px;height:11px;background:#57c237;border:1px solid #17651d;border-radius:3px}
.outnum{font-size:16px;font-weight:900;color:#1f8a2e}
.log{background:#111;color:#eee;border-radius:12px;padding:8px;font-family:monospace;font-size:12px;max-height:140px;overflow:auto}
@media(min-width:750px){.grid{grid-template-columns:1fr 28px 1fr 28px 1fr}.arrow{transform:none}.box,.out{min-height:110px}.worker{font-size:44px}.stack{height:55px}.cube{width:16px;height:16px}}
</style>
</head>
<body>
<header><h1>Business Revenue Sequence Simulator</h1><p>One panel per minimum step required to get paid.</p></header>
<main>
<div class="controls"><button id="start">START</button><button id="pause">PAUSE</button><button id="step">STEP</button><button id="reset">RESET</button></div>
<div class="card" id="status">JavaScript: loading...</div>
<div class="metrics">
<div class="card metric"><b>Cycle</b><span id="cycle">0</span></div>
<div class="card metric"><b>Panel</b><span id="panelNo">--</span></div>
<div class="card metric"><b>Cash</b><span id="cash">$0</span></div>
<div class="card metric"><b>Paid Orders</b><span id="paid">0</span></div>
</div>
<details open>
<summary><b>Scenario Controls</b></summary>
<label>Starting Cash <span id="cashLab"></span></label><input type="range" id="startCash" min="1000" max="100000" step="1000" value="25000">
<label>Process Strength <span id="strLab"></span></label><input type="range" id="strength" min="10" max="100" step="5" value="60">
<label>Overhead Per Step <span id="ohLab"></span></label><input type="range" id="overhead" min="0" max="2000" step="50" value="350">
<label>Revenue Per Paid Unit <span id="revLab"></span></label><input type="range" id="revenue" min="100" max="5000" step="100" value="800">
<label>Run Speed <span id="speedLab"></span></label><input type="range" id="speed" min="1000" max="4000" step="250" value="2000">
</details>
<div id="seq"></div><div class="log" id="log"></div>
</main>
<script>
const panels=[
["Customer Need / Problem","Find a real pain worth solving.","🧑‍💼","Discover","Qualified Need",[["Leads","📣","b"],["Trust","🤝","y"],["Research","📋","b"],["Cash","💵","g"]]],
["Front-End Sales","Turn attention into a serious buyer.","📞","Sell","Closed Deal",[["Qualified Need","🎯","b"],["Marketing","📣","y"],["Labor","👷","b"],["Cash","💵","g"]]],
["Design / Specification","Convert the sale into a buildable promise.","🧑‍💻","Specify","Approved Spec",[["Closed Deal","🧾","b"],["Design Hours","📐","b"],["Customer Info","🗂️","y"],["Cash","💵","g"]]],
["Supply / Factory / Delivery","Convert the spec into delivered value.","🛠️","Build","Delivered Value",[["Approved Spec","✅","b"],["Materials","📦","o"],["Labor","👷","b"],["Energy","⚡","y"]]],
["Payment / Collection","Convert delivered value into real cash.","💳","Collect","Paid Order",[["Delivered Value","🚚","b"],["Invoice Work","🧾","b"],["Trust","🤝","y"],["Cash Buffer","💵","g"]]],
["Customer Satisfaction / Referral","Convert paid work into future demand.","⭐","Satisfy","Referral / Repeat",[["Paid Order","💰","g"],["Support","🎧","b"],["Quality","✅","y"],["Follow-Up","📣","y"]]]
];
let s={run:false,t:null,cycle:0,panel:0,cash:25000,paid:0,vals:[],outs:[]};
const $=id=>document.getElementById(id);
const money=v=>"$"+Math.round(v).toLocaleString();
const num=id=>Number($(id).value);
function labels(){
 $("cashLab").textContent=money(num("startCash"));
 $("strLab").textContent=num("strength")+"%";
 $("ohLab").textContent=money(num("overhead"));
 $("revLab").textContent=money(num("revenue"));
 $("speedLab").textContent=(num("speed")/1000).toFixed(2)+" sec";
}
function blocks(v,c){
 let n=Math.round(Math.max(0,Math.min(100,v))/10),h='<div class="bar">';
 for(let i=0;i<10;i++)h+=`<div class="blk ${i<n?'on '+c:''}"></div>`;
 return h+"</div>";
}
function cubes(v){
 let n=Math.min(20,Math.round(v/5)),h="";
 for(let i=0;i<n;i++)h+='<div class="cube"></div>';
 return h;
}
function render(){
 let h="";
 panels.forEach((p,i)=>{
  let rem=s.vals[i].reduce((a,b)=>a+b,0),out=s.outs[i];
  h+=`<div class="panel ${i==s.panel?'active':''}">
  <div class="title">PANEL ${i+1}: ${p[0]}</div><div class="sub">${p[1]}</div>
  <div class="grid"><div class="inputs">`;
  p[5].forEach((r,k)=>{
   let v=s.vals[i][k];
   h+=`<div class="row"><div>${r[1]}</div><div><div class="name">${r[0]}</div>${blocks(v,r[2])}</div><div class="val">${Math.round(v)}</div></div>`;
  });
  h+=`</div><div class="arrow"></div>
  <div class="box"><h3>CONVERSION</h3><div class="worker">${p[2]}</div><div class="note">${p[3]}</div></div>
  <div class="arrow g"></div>
  <div class="out"><h3>OUTPUT</h3><div class="stack">${cubes(out)}</div><div>${p[4]}</div><div class="outnum">${Math.round(out)}</div></div>
  </div><p><b>Inputs:</b> ${Math.round(rem)} / 400 &nbsp; <b>Output:</b> ${Math.round(out)}</p></div>`;
 });
 $("seq").innerHTML=h;
 $("cycle").textContent=s.cycle;
 $("panelNo").textContent=(s.panel+1)+" / "+panels.length;
 $("cash").textContent=money(s.cash);
 $("paid").textContent=s.paid;
}
function log(x){$("log").innerHTML+=x+"<br>";$("log").scrollTop=$("log").scrollHeight}
function status(x){$("status").textContent="JavaScript: RUNNING — "+x}
function reset(){
 pauseRun();s.cycle=0;s.panel=0;s.cash=num("startCash");s.paid=0;s.vals=[];s.outs=[];
 for(let i=0;i<panels.length;i++){s.vals.push([100,100,100,100]);s.outs.push(0)}
 $("log").innerHTML="";log("Reset. Ready.");status("tap STEP or START.");render();
}
function step(){
 if(s.cash<=0){status("cash is zero");pauseRun();return}
 let i=s.panel,st=num("strength")/100;
 s.cycle++;s.cash-=num("overhead");
 let avg=s.vals[i].reduce((a,b)=>a+b,0)/4;
 let proc=Math.min(avg,(8+Math.random()*8)*st);
 for(let k=0;k<4;k++)s.vals[i][k]=Math.max(0,s.vals[i][k]-proc*(.75+Math.random()*.55));
 s.outs[i]+=proc*(.85+st*.9);
 if(i==4){let paid=Math.max(1,Math.round(proc/10));s.paid+=paid;s.cash+=paid*num("revenue")}
 let rem=s.vals[i].reduce((a,b)=>a+b,0);
 if(s.outs[i]>=80||rem<=80){log("Panel "+(i+1)+" complete: "+panels[i][4]);s.panel=(i+1)%panels.length}
 if(s.cash<0){s.cash=0;log("FAILURE: cash reached zero.");pauseRun()}
 status("processing panel "+(s.panel+1));render();
 if(s.run)document.querySelector(".panel.active").scrollIntoView({behavior:"smooth",block:"nearest"});
}
function startRun(){
 if(s.run)return;s.run=true;$("start").textContent="RUNNING";status("running slowly");s.t=setInterval(step,num("speed"));
}
function pauseRun(){clearInterval(s.t);s.run=false;$("start").textContent="START";status("paused")}
$("start").onclick=startRun;$("pause").onclick=pauseRun;$("step").onclick=step;$("reset").onclick=reset;
["startCash","strength","overhead","revenue","speed"].forEach(id=>{
 $(id).oninput=()=>{labels();if(id=="speed"&&s.run){pauseRun();startRun()}if(s.cycle==0){s.cash=num("startCash");render()}};
});
labels();reset();
</script>
</body>
</html>
